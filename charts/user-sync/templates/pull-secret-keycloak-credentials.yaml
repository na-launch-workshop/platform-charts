apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-admin
spec:
  refreshInterval: "2m"
  secretStoreRef:
    name: eso-admin-secret-store
    kind: ClusterSecretStore
  target:
    name: keycloak-credentials
  data:
  - secretKey: KEYCLOAK_PASSWORD
    remoteRef:
      key: keycloak-client-secret-openshift
      property: password
  - secretKey: KEYCLOAK_USERNAME
    remoteRef:
      key: keycloak-client-secret-openshift
      property: username
