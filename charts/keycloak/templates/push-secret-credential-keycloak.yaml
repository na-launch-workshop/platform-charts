{{- if not .Values.shared.enabled }}
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: "push-secret-keycloak-client-secret-openshift"
spec:
  deletionPolicy: Delete
  refreshInterval: 10s
  secretStoreRefs:
    - name: eso-admin-secret-store
      kind: ClusterSecretStore
  selector:
    secret:
      name: keycloak-initial-admin
  data:
    - match:
        secretKey: "password"
        remoteRef:
          remoteKey: keycloak-client-secret-openshift
          property: "password"
    - match:
        secretKey: "username"
        remoteRef:
          remoteKey: keycloak-client-secret-openshift
          property: "username"
{{- end }}