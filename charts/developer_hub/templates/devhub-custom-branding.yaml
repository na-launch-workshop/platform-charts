# ------------------------------------------------------------------------------
# To apply a custom branded logo:
# - Uncomment the ConfigMap below
# - Set DEVHUB_FULL_LOGO and/or DEVHUB_ICON_LOGO to data URIs, e.g.:
#     data:image/png;base64,$(cat image.png | base64 -w 0)
# - Apply to the same namespace as Developer Hub (typically backstage)
# - Re-sync the developer_hub chart so the Backstage CR references this ConfigMap
#
# When this ConfigMap is absent, backstage-app-config uses the default logos
# defined in 3-wave-config-backstage-app.yaml via ${DEVHUB_*_LOGO: "..."} fallbacks.
# ------------------------------------------------------------------------------
# apiVersion: v1
# kind: ConfigMap
# metadata:
#   name: devhub-custom-branding
#   namespace: backstage
# data:
#   HOMEPAGE_TITLE: "Red Hat Launch Workshop"
#   HOMEPAGE_SUBTITLE: "Welcome to Developer Hub {{ `{{displayName}}` }}!"
#   PRIMARY_LIGHT_COLOR: "#ee0000"
#   PRIMARY_DARK_COLOR: "#5f0000"
#   DEVHUB_FULL_LOGO: "data:image/png;base64,your_custom_base64_encoded_logo_here"
#   DEVHUB_ICON_LOGO: "data:image/png;base64,your_custom_base64_encoded_logo_here"
