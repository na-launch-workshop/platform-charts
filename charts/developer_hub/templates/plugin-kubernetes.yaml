kind: ConfigMap
apiVersion: v1
metadata:
  name: kubernetes-plugin
data:
  kubernetes-plugin.yaml: |
    kubernetes:
      clusterLocatorMethods:
        - type: config
          clusters:
            {{- if .Values.clusters }}
            {{- range .Values.clusters  }}
            - authProvider: oidc
              name: {{ .name }}
              skipTLSVerify: true
              oidcTokenProvider: oidc
              url: {{ (cluster.type == 'hcp' and (cluster['domain'] | default('', true) | length > 0)) | ternary('rosa.', '') }}{{ cluster['domain'] | default(terraform_outputs[cluster.name + '_domain']['value'], true) }}
            {{- end }}
            {{- else }}
            []
            {{- end }}
      customResources:
        - apiVersion: v1
          group: route.openshift.io
          plural: routes
        - apiVersion: 'v1'
          group: 'tekton.dev'
          plural: 'pipelineruns'
        - apiVersion: 'v1'
          group: 'tekton.dev'
          plural: 'taskruns'
      serviceLocatorMethod:
        type: multiTenant

    dynamicPlugins:
      frontend:
        backstage.plugin-kubernetes:
          mountPoints:
            - mountPoint: entity.page.kubernetes/cards
              importName: EntityKubernetesContent
              config:
                layout:
                  gridColumn: "1 / -1"
                if:
                  anyOf:
                    - hasAnnotation: backstage.io/kubernetes-id
                    - hasAnnotation: backstage.io/kubernetes-namespace
